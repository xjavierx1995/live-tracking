version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: ${COMPOSE_PROJECT_NAME}_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        SUPERVISOR_CONF: supervisord.conf
    container_name: ${COMPOSE_PROJECT_NAME}_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      simulator:
        condition: service_healthy
    environment:
      APP_URL: ${BACKEND_APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: ${BACKEND_DB_HOST}
      DB_PORT: ${BACKEND_DB_PORT}
      DB_DATABASE: ${BACKEND_DB_DATABASE}
      DB_USERNAME: ${BACKEND_DB_USERNAME}
      DB_PASSWORD: ${BACKEND_DB_PASSWORD}
      TRACKING_SIMULATOR_BASE_URL: ${BACKEND_TRACKING_SIMULATOR_BASE_URL}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/test"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  simulator:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        SUPERVISOR_CONF: supervisord-simulator.conf
    container_name: ${COMPOSE_PROJECT_NAME}_simulator
    working_dir: /var/www/html
    volumes:
      - ./tracking-simulator:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_URL: ${SIMULATOR_APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: ${SIMULATOR_DB_HOST}
      DB_PORT: ${SIMULATOR_DB_PORT}
      DB_DATABASE: ${SIMULATOR_DB_DATABASE}
      DB_USERNAME: ${SIMULATOR_DB_USERNAME}
      DB_PASSWORD: ${SIMULATOR_DB_PASSWORD}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      ORS_API_KEY: ${SIMULATOR_ORS_API_KEY}
      ORS_BASE_URL: ${SIMULATOR_ORS_BASE_URL}
      SIMULATION_TICK_SECONDS: ${SIMULATOR_SIMULATION_TICK_SECONDS}
      SIMULATOR_ROUTE_CENTER_LAT: ${SIMULATOR_ROUTE_CENTER_LAT}
      SIMULATOR_ROUTE_CENTER_LNG: ${SIMULATOR_ROUTE_CENTER_LNG}
      SIMULATOR_ROUTE_RADIUS_METERS: ${SIMULATOR_ROUTE_RADIUS_METERS}
    expose:
      - "8001"
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/simulator/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  simulator-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        SUPERVISOR_CONF: supervisord-simulator.conf
    container_name: ${COMPOSE_PROJECT_NAME}_simulator_worker
    working_dir: /var/www/html
    volumes:
      - ./tracking-simulator:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      simulator:
        condition: service_healthy
    environment:
      APP_URL: ${SIMULATOR_APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: ${SIMULATOR_DB_HOST}
      DB_PORT: ${SIMULATOR_DB_PORT}
      DB_DATABASE: ${SIMULATOR_DB_DATABASE}
      DB_USERNAME: ${SIMULATOR_DB_USERNAME}
      DB_PASSWORD: ${SIMULATOR_DB_PASSWORD}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SIMULATION_TICK_SECONDS: ${SIMULATOR_SIMULATION_TICK_SECONDS}
      RUN_MIGRATIONS: "false"
    command: php artisan queue:work --tries=1 --sleep=1
    networks:
      - live-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}_frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: ${VITE_API_BASE_URL}
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME}_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      simulator:
        condition: service_healthy
    networks:
      - live-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:

networks:
  live-network: